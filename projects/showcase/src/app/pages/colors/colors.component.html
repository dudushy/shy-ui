<div class="page">
  <h1 class="page-title">Colors</h1>
  <p class="page-desc">The design system color palette and tokens.</p>

  @for (group of colorGroups; track group.name) {
    <section class="section">
      <h2 class="section-title">{{ group.name }}</h2>
      <div class="color-grid">
        @for (color of group.colors; track color.name) {
          <div class="color-card">
            <div class="color-swatch" [style.background-color]="color.value">
              <span [style.color]="color.textDark ? '#111827' : '#ffffff'">{{ color.value }}</span>
            </div>
            <div class="color-info">{{ color.name }}</div>
          </div>
        }
      </div>
    </section>
  }
</div>
