@if (open) {
  <div class="shy-modal-overlay" (click)="close()">
    <div class="shy-modal shy-modal--{{size}}" (click)="$event.stopPropagation()">
      <div class="shy-modal__header">
        <h2 class="shy-modal__title">{{ title }}</h2>
        <button class="shy-modal__close" (click)="close()" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="shy-modal__body">
        <ng-content />
      </div>
      <ng-content select="[modal-footer]" />
    </div>
  </div>
}
